<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5865F2" />
      <stop offset="100%" stop-color="#a056f5" />
    </linearGradient>
    
    <mask id="crescentMask">
      <circle cx="40" cy="40" r="28" fill="#ffffff" />
      <circle cx="47" cy="32" r="28" fill="#000000" />
    </mask>

    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e0ff" />
    </linearGradient>
  </defs>

  <!-- Sleek Cut Crescent -->
  <circle cx="40" cy="40" r="28" fill="url(#glassGrad)" mask="url(#crescentMask)" />
  
  <!-- Minimal Spark/Star -->
  <circle cx="50" cy="30" r="3.5" fill="url(#dotGrad)" />
</svg>
